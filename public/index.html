<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>ניתוח מודעה מתצלום מסך</title>
<style>
body{font-family:Arial;background:#f6f7fb;padding:20px}
.wrap{max-width:700px;margin:auto;background:#fff;padding:20px;border-radius:12px}
button{padding:12px;background:black;color:white;border:none;border-radius:8px;margin-top:10px}
</style>
</head>
<body>
<div class="wrap">
<h2>העלה צילום מסך</h2>
<input type="file" id="file"/>
<button onclick="send()">נתח</button>
<pre id="out"></pre>
</div>
<script>
async function send(){
const f=document.getElementById('file').files[0];
if(!f){alert("תעלה קובץ");return;}
const fd=new FormData();
fd.append("screenshot",f);
document.getElementById("out").innerText="מנתח...";
const r=await fetch("/analyze-screenshot",{method:"POST",body:fd});
const j=await r.json();
document.getElementById("out").innerText=JSON.stringify(j,null,2);
}
</script>
</body>
</html>
